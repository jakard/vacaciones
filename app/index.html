<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Time Off — coverage, sorted.</title>
  <meta name="description" content="A calm coverage marketplace for Google TAMs. Post a request, earn doubloons, take real time off without dropping the ball." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to main content</a>
  <header id="header" hidden role="banner">
    <a href="#/" class="brand" aria-label="Time Off — go to home">
      <svg class="brand-logo" viewBox="0 0 40 40" aria-hidden="true">
        <!-- Unplugged power glyph -->
        <circle cx="20" cy="22" r="12.5" fill="none" stroke="currentColor" stroke-width="3.4"/>
        <rect x="18.3" y="6" width="3.4" height="13" rx="1.7" fill="currentColor"/>
      </svg>
      <span class="brand-name">Time Off</span>
    </a>
    <div class="user" id="user-info"></div>
  </header>

  <main id="app" role="main" tabindex="-1">
    <div class="loading" role="status" aria-live="polite">
      <span class="loading-doubloon" aria-hidden="true">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect x="3" y="1" width="10" height="1" fill="#5A3A1F"/>
          <rect x="2" y="2" width="12" height="1" fill="#5A3A1F"/>
          <rect x="1" y="3" width="14" height="10" fill="#5A3A1F"/>
          <rect x="2" y="13" width="12" height="1" fill="#5A3A1F"/>
          <rect x="3" y="14" width="10" height="1" fill="#5A3A1F"/>
          <rect x="3" y="3" width="10" height="10" fill="#FFCB47"/>
          <rect x="4" y="4" width="8" height="8" fill="#E0A93B"/>
        </svg>
      </span>
    </div>
  </main>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root"></div>
  <div id="coin-shower"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
